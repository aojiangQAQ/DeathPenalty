# ╔══════════════════════════════════════════════════════╗
# ║          DeathPenalty 死亡惩罚插件配置文件            ║
# ║          制作团队：曙光团队  |  制作人：鳌江           ║
# ╚══════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────
# 金钱惩罚设置
# ─────────────────────────────────────────────
penalty:
  # 金钱惩罚总开关（false=关闭金钱扣除）
  enabled: true

  # 扣款模式
  #   percent - 按玩家当前余额百分比扣除（推荐）
  #   fixed   - 扣除固定金额
  mode: percent

  # 百分比模式：每次死亡扣除余额的百分比（0~100）
  # 例：15 = 扣除余额的 15%
  percent: 15.0

  # 固定金额模式：每次死亡扣除固定金额
  # 若余额不足，则扣除全部余额（不会变成负数）
  fixed-amount: 1000.0

# ─────────────────────────────────────────────
# 经验值惩罚设置
# ─────────────────────────────────────────────
exp-penalty:
  # 经验值惩罚总开关（false=关闭经验值扣除）
  enabled: true

  # 扣除模式
  #   levels  - 按当前等级的百分比扣除等级（推荐）
  #   points  - 直接扣除固定经验点数
  mode: levels

  # levels 模式：每次死亡扣除当前等级的百分比（0~100）
  # 例：20 = 扣除当前等级的 20%（如玩家50级，扣10级）
  level-percent: 20.0

  # points 模式：每次死亡直接扣除固定经验点数
  # 扣除后经验不会低于 0
  fixed-points: 100

  # 是否允许经验值惩罚将玩家扣至 0 级（true=允许扣到0，false=最低保留0经验点）
  allow-zero: true

# ─────────────────────────────────────────────
# 全服广播设置
# ─────────────────────────────────────────────
broadcast:
  # 是否在玩家死亡扣款后向全服广播（金钱）
  enabled: false

  # 广播消息内容
  # 可用变量：{player}=玩家名，{amount}=扣除金额
  message: "&7[死亡惩罚] &e{player} &7死亡被扣除 &c{amount} &7金币！"

  # 是否在玩家死亡扣除经验后广播
  exp-enabled: false

  # 经验广播消息内容
  # 可用变量：{player}=玩家名，{exp}=扣除量（等级数或经验点），{type}=级/经验点
  exp-message: "&7[死亡惩罚] &e{player} &7死亡被扣除 &b{exp} &7{type}！"

# ─────────────────────────────────────────────
# 消息设置
# ─────────────────────────────────────────────
messages:
  # 死亡惩罚提示（金钱，发送给死亡玩家）
  # 可用变量：{amount}=扣除金额，{balance}=当前余额
  death-penalty: "&c你死亡了！扣除 &e{amount} &c金币，当前余额：&e{balance}"

  # 死亡经验惩罚提示（发送给死亡玩家）
  # 可用变量：{exp}=扣除量，{type}=级/经验点，{level}=当前等级
  death-exp-penalty: "&9你死亡了！扣除 &b{exp} &9{type}，当前等级：&b{level}"

  # 余额为零时是否提示
  show-no-balance: true

  # 余额为零时的提示消息
  no-balance: "&7你死亡了，但余额为零，无法扣除金币。"

  # 经验为零时是否提示
  show-no-exp: true

  # 经验为零时的提示消息
  no-exp: "&7你死亡了，但经验值为零，无法扣除经验。"
